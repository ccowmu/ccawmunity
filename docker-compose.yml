version: "2"
services:
  bot:
    build: .
    env_file: .env
    restart: always
    environment:
      LDAP_URL: ldap://containers-openldap-1:389
    networks:
      - default
      - ldap
    depends_on:
      - redis

  redis:
    image: "redis:alpine"
    volumes:
      - /home/sysadmin/ccawmunity/data:/data
    networks:
      - default

  office-presence:
    build: /home/sysadmin/office-presence
    restart: always
    volumes:
      - /tmp/morgana-dhcp.leases:/app/dhcp4.leases:ro
      - office-data:/app/data
    networks:
      - default
  stickerpicker:
    build: /home/sysadmin/stickerpicker
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    networks:
      default:
      caddy:
        aliases:
          - stickerpicker

volumes:
  office-data:

networks:
  ldap:
    external: true
  caddy:
    external: true
